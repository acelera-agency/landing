            - button "How does Antimetal understand my systems?" [ref=e174]
            - region "How does Antimetal understand my systems?":
              - generic [ref=e179]:
                - paragraph [ref=e180]: Antimetal builds a continuously evolving world model of your production environment by connecting to the tools you already use.
                - paragraph [ref=e181]: Each signal is normalized and linked to the systems, changes, and people around it, so a deployment connects to the metrics it changed, the alert it triggered, and the engineer who pushed it.
                - paragraph [ref=e182]: The result is persistent operational context that updates in real time and improves the longer Antimetal runs.
          - separator [ref=e183]
          - generic [ref=e184] [cursor=pointer]:
            - button "Does Antimetal replace observability tools?" [ref=e185]
            - region "Does Antimetal replace observability tools?":
              - generic [ref=e190]:
                - paragraph [ref=e191]: No. Antimetal sits on top of the observability tools you already use and uses their data to build and maintain its world model.
                - paragraph [ref=e192]: Observability platforms were built for humans to read dashboards and investigate alerts. Antimetal is built for a world where production operates itself.
          - separator [ref=e193]
          - generic [ref=e194] [cursor=pointer]:
            - button "Why isn't a coding agent enough?" [ref=e195]
            - region "Why isn't a coding agent enough?":
              - generic [ref=e200]:
                - paragraph [ref=e201]: "Coding agents are good at generating code. Operating production is different. It requires continuous understanding of a live system: what changed, what depends on what, what failed before, and what is happening right now."
                - paragraph [ref=e202]: That understanding cannot come from a single prompt or context window. Antimetal's world model gives agents continuously updated operational context across your infrastructure, telemetry, deployments, and code.
                - paragraph [ref=e203]: That is what allows Antimetal to reason about production systems in ways standard coding agents cannot.
          - separator [ref=e204]
          - generic [ref=e205] [cursor=pointer]:
            - button "What can Antimetal do autonomously?" [ref=e206]
            - region "What can Antimetal do autonomously?":
              - generic [ref=e211]:
                - paragraph [ref=e212]: Antimetal can investigate incidents, trace failures across systems, identify likely root causes, propose fixes, open pull requests, and carry out operational workflows on your behalf.
                - paragraph [ref=e213]: It starts with read access to your observability, infrastructure, and code systems so it can build and maintain its world model. From there, you control what actions it is allowed to take.
                - paragraph [ref=e214]: By default, changes still route through your existing approval flow, whether that is a pull request, deployment pipeline, or Slack approval.
