          - generic [ref=f2e201] [cursor=pointer]:
            - button "How does Antimetal understand my systems?" [ref=f2e202]
            - region "How does Antimetal understand my systems?":
              - generic [ref=f2e207]:
                - paragraph [ref=f2e208]: Antimetal builds a continuously evolving world model of your production environment by connecting to the tools you already use.
                - paragraph [ref=f2e209]: Each signal is normalized and linked to the systems, changes, and people around it, so a deployment connects to the metrics it changed, the alert it triggered, and the engineer who pushed it.
                - paragraph [ref=f2e210]: The result is persistent operational context that updates in real time and improves the longer Antimetal runs.
          - separator [ref=f2e211]
          - generic [ref=f2e212] [cursor=pointer]:
            - button "Does Antimetal replace observability tools?" [ref=f2e213]
            - region "Does Antimetal replace observability tools?":
              - generic [ref=f2e218]:
                - paragraph [ref=f2e219]: No. Antimetal sits on top of the observability tools you already use and uses their data to build and maintain its world model.
                - paragraph [ref=f2e220]: Observability platforms were built for humans to read dashboards and investigate alerts. Antimetal is built for a world where production operates itself.
          - separator [ref=f2e221]
          - generic [ref=f2e222] [cursor=pointer]:
            - button "Why isn't a coding agent enough?" [ref=f2e223]
            - region "Why isn't a coding agent enough?":
              - generic [ref=f2e228]:
                - paragraph [ref=f2e229]: "Coding agents are good at generating code. Operating production is different. It requires continuous understanding of a live system: what changed, what depends on what, what failed before, and what is happening right now."
                - paragraph [ref=f2e230]: That understanding cannot come from a single prompt or context window. Antimetal's world model gives agents continuously updated operational context across your infrastructure, telemetry, deployments, and code.
                - paragraph [ref=f2e231]: That is what allows Antimetal to reason about production systems in ways standard coding agents cannot.
          - separator [ref=f2e232]
          - generic [ref=f2e233] [cursor=pointer]:
            - button "What can Antimetal do autonomously?" [ref=f2e234]
            - region "What can Antimetal do autonomously?":
              - generic [ref=f2e239]:
                - paragraph [ref=f2e240]: Antimetal can investigate incidents, trace failures across systems, identify likely root causes, propose fixes, open pull requests, and carry out operational workflows on your behalf.
                - paragraph [ref=f2e241]: It starts with read access to your observability, infrastructure, and code systems so it can build and maintain its world model. From there, you control what actions it is allowed to take.
                - paragraph [ref=f2e242]: By default, changes still route through your existing approval flow, whether that is a pull request, deployment pipeline, or Slack approval.
          - separator [ref=f2e243]
